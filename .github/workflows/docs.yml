name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect .md files from entire repo into docs/
        run: |
          find . -name "*.md" \
            ! -path "./docs/*" \
            ! -path "./site/*" \
            ! -path "./.git/*" \
            ! -path "./.github/*" \
            ! -path "./node_modules/*" \
          | while read -r file; do
              dest="docs/${file#./}"
              mkdir -p "$(dirname "$dest")"
              cp "$file" "$dest"
              echo "  collected: $file → $dest"
            done

      - name: Build site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
